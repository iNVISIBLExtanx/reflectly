version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: reflectly-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: reflectly
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - reflectly-network

  # Backend API (Flask)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reflectly-backend
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/reflectly?authSource=admin
      FLASK_ENV: development
    ports:
      - "5002:5002"
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    networks:
      - reflectly-network

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reflectly-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_BASE_URL: http://localhost:5002
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - reflectly-network

volumes:
  mongodb_data:

networks:
  reflectly-network:
    driver: bridge
